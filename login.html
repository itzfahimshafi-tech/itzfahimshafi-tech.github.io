
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন - sfearning.com</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background-color: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #4a6fa5; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #169b82; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #127a65; }
        .register-link { text-align: center; margin-top: 15px; }
        .register-link a { color: #4a6fa5; text-decoration: none; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>লগইন করুন</h2>
    <form action="#" method="POST">
        <div class="form-group">
            <label for="email">জিমেইল এড্রেস</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">পাসওয়ার্ড</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">লগইন করুন</button>
    </form>
    <div class="register-link">
        অ্যাকাউন্ট নেই? <a href="#">রেজিস্ট্রেশন করুন</a>
    </div>
</div>

</body>
</html>
